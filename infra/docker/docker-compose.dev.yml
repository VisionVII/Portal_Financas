version: "3.9"

# Portal Finanças — Stack de Desenvolvimento Local
# Uso: docker compose -f infra/docker/docker-compose.dev.yml up -d

name: portal-financas-dev

services:

  # ============================================================
  # BANCO DE DADOS PRINCIPAL
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: pf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal_dev_2026
      POSTGRES_DB: portal_financas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal_financas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pf-network

  # ============================================================
  # TIMESCALEDB — Séries temporais de mercado
  # ============================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: pf-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal_dev_2026
      POSTGRES_DB: portal_timeseries
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal_timeseries"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pf-network

  # ============================================================
  # REDIS — Cache, sessões, pub/sub
  # ============================================================
  redis:
    image: redis:7.4-alpine
    container_name: pf-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pf-network

  # ============================================================
  # KAFKA — Event streaming
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: pf-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - pf-network

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: pf-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - pf-network

  # UI para Kafka (desenvolvimento)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: pf-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - pf-network

  # ============================================================
  # OPENSEARCH — Busca full-text
  # ============================================================
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: pf-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - pf-network

  # ============================================================
  # MINIO — Object Storage (S3-compatible)
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: pf-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: portal_admin
      MINIO_ROOT_PASSWORD: portal_minio_2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - pf-network

  # ============================================================
  # OBSERVABILIDADE
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: pf-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - pf-network

  grafana:
    image: grafana/grafana:11.3.0
    container_name: pf-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: portal_grafana_2026
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - pf-network

# ============================================================
# VOLUMES
# ============================================================
volumes:
  postgres_data:
  timescale_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  opensearch_data:
  minio_data:
  prometheus_data:
  grafana_data:

# ============================================================
# NETWORK
# ============================================================
networks:
  pf-network:
    driver: bridge
    name: portal-financas-network
